<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Infinity Transportation &amp; Logistics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* INFINITY — Marketing Site (The Monolith) */

:root {
  --ink:        #0e0d0b;
  --ink-2:      #1a1714;
  --ink-3:      #2a2520;
  --paper:      #f4f1ea;
  --paper-2:    #ebe6da;
  --paper-3:    #d9d2c0;
  --brass:      #d4a04a;
  --brass-deep: #a87a2e;
  --brass-pale: #e8c787;
  --rust:       #8a3a1a;
  --moss:       #2f3a1f;
  --slate:      #3a3835;
  --rule:       rgba(14,13,11,0.12);
  --rule-dark:  rgba(244,241,234,0.12);
  --mute:       rgba(14,13,11,0.55);
  --mute-dark:  rgba(244,241,234,0.55);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: var(--paper); color: var(--ink); font-family: 'Manrope', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

/* Type */
h1, h2, h3, h4 { margin: 0; font-family: 'Manrope', sans-serif; letter-spacing: -0.04em; line-height: 0.95; font-weight: 800; }
.eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--brass-deep); }
.eyebrow-dark { color: var(--brass); }
.lead { font-family: 'Fraunces', serif; font-weight: 400; font-size: 22px; line-height: 1.4; letter-spacing: -0.005em; }
.body { font-family: 'Manrope', sans-serif; font-size: 16px; line-height: 1.6; color: var(--ink-2); }
.mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.18em; text-transform: uppercase; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 22px; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s ease; text-decoration: none; }
.btn-primary { background: var(--brass); color: var(--ink); }
.btn-primary:hover { background: var(--brass-pale); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--paper); border: 1px solid var(--rule-dark); }
.btn-ghost:hover { border-color: var(--brass); color: var(--brass); }
.btn-ink { background: var(--ink); color: var(--paper); }
.btn-ink:hover { background: var(--ink-3); }
.btn-ghost-ink { background: transparent; color: var(--ink); border: 1px solid var(--rule); }
.btn-ghost-ink:hover { border-color: var(--brass); color: var(--brass-deep); }

/* Nav */
.nav { position: sticky; top: 0; z-index: 50; background: rgba(14,13,11,0.95); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--rule-dark); }
.nav-inner { max-width: 1280px; margin: 0 auto; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; background: none; border: none; padding: 0; }
.nav-logo .word { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.04em; color: var(--paper); }
.nav-links { display: flex; gap: 32px; }
.nav-link { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(244,241,234,0.7); cursor: pointer; transition: color 0.15s; background: none; border: none; padding: 0; }
.nav-link:hover, .nav-link.active { color: var(--brass); }
.nav-link:focus-visible { outline: 2px solid var(--brass); outline-offset: 4px; }
.nav-cta { display: flex; gap: 12px; align-items: center; }

/* Footer */
.footer { background: var(--ink); color: var(--paper); padding: 80px 32px 40px; }
.footer-inner { max-width: 1280px; margin: 0 auto; }
.footer-top { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; padding-bottom: 48px; border-bottom: 1px solid var(--rule-dark); }
.footer-col h4 { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--brass); margin-bottom: 18px; font-weight: 600; line-height: 1; }
.footer-col a { display: block; color: rgba(244,241,234,0.7); font-size: 14px; padding: 6px 0; text-decoration: none; cursor: pointer; transition: color 0.15s; font-family: 'Manrope', sans-serif; }
.footer-col a:hover { color: var(--brass); }
.footer-bot { display: flex; justify-content: space-between; padding-top: 32px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(244,241,234,0.5); }

/* Section primitives */
.section { padding: 120px 32px; }
.section-inner { max-width: 1280px; margin: 0 auto; }
.section-dark { background: var(--ink); color: var(--paper); }
.section-cream { background: var(--paper); }
.section-stone { background: var(--paper-2); }

/* Hero */
.hero { background: var(--ink); color: var(--paper); position: relative; overflow: hidden; min-height: 720px; display: flex; align-items: center; }
.hero-grid-bg { position: absolute; inset: 0; background-image: linear-gradient(to right, rgba(212,160,74,0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(212,160,74,0.04) 1px, transparent 1px); background-size: 80px 80px; }
.hero-glow { position: absolute; right: -200px; top: 50%; transform: translateY(-50%); width: 800px; height: 800px; background: radial-gradient(circle, rgba(212,160,74,0.12) 0%, transparent 60%); pointer-events: none; }
.hero-inner { max-width: 1280px; margin: 0 auto; padding: 80px 32px; position: relative; z-index: 1; display: grid; grid-template-columns: 1.3fr 1fr; gap: 64px; align-items: center; }

/* Card */
.card { background: var(--paper); border: 1px solid var(--rule); padding: 32px; transition: all 0.15s; }
.card-dark { background: rgba(244,241,234,0.04); border: 1px solid rgba(244,241,234,0.12); color: var(--paper); }
.card:hover { border-color: var(--brass); transform: translateY(-2px); }

/* Tracking widget */
.track-widget { background: var(--ink); border: 1px solid var(--rule-dark); padding: 28px; }
.track-input-row { display: flex; gap: 0; margin-top: 14px; }
.track-input { flex: 1; background: rgba(244,241,234,0.06); border: 1px solid rgba(244,241,234,0.15); color: var(--paper); padding: 16px 18px; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.18em; outline: none; }
.track-input:focus { border-color: var(--brass); }
.track-input::placeholder { color: rgba(244,241,234,0.35); }

/* Form */
.field { display: flex; flex-direction: column; gap: 8px; }
.label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--mute); }
.input { padding: 14px 16px; border: 1px solid var(--rule); background: var(--paper); font-family: 'Manrope', sans-serif; font-size: 15px; outline: none; transition: border-color 0.15s; width: 100%; }
.input:focus { border-color: var(--ink); }
.input-dark { background: rgba(244,241,234,0.05); border: 1px solid rgba(244,241,234,0.15); color: var(--paper); padding: 14px 16px; font-family: 'Manrope', sans-serif; font-size: 15px; outline: none; transition: border-color 0.15s; width: 100%; }
.input-dark:focus { border-color: var(--brass); }

/* Stats */
.stat-num { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 64px; letter-spacing: -0.05em; line-height: 0.9; }
.stat-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--mute); margin-top: 8px; }

/* Focus visible */
button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--brass);
  outline-offset: 2px;
}

/* Animations */
@keyframes truckRoll { 0% { transform: translateX(-20px); } 50% { transform: translateX(20px); } 100% { transform: translateX(-20px); } }
@keyframes pulseDot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.4); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes dash { to { stroke-dashoffset: -100; } }

.fade-up { animation: fadeUp 0.6s ease-out backwards; }

/* Utility */
.rule-brass { width: 40px; height: 2px; background: var(--brass); }
.divider { height: 1px; background: var(--rule); }
.divider-dark { height: 1px; background: var(--rule-dark); }

/* Responsive */
@media (max-width: 1024px) {
  .hero-inner { grid-template-columns: 1fr; }
  .footer-top { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  .nav-links { display: none; }
  .section { padding: 60px 20px; }
  .hero-inner { padding: 60px 20px; }
  .footer-top { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect } = React;

/* ── MARK (logo SVG) ── */
const Mark = ({ size = 56, stroke = 'var(--paper)', accent = 'var(--brass)', strokeWidth = 6 }) => (
  <svg viewBox="0 0 96 64" width={size} height={size * 64 / 96} fill="none" style={{ display: 'block' }}>
    <path
      d="M16 32 C 16 16, 40 16, 48 32 C 56 48, 80 48, 80 32 C 80 16, 56 16, 48 32 C 40 48, 16 48, 16 32 Z"
      stroke={stroke} strokeWidth={strokeWidth} strokeLinejoin="round"
    />
    <path d="M62 22 L 78 32 L 62 42 Z" fill={accent} />
  </svg>
);

/* ── NAV ── */
const Nav = ({ route, setRoute }) => {
  const links = [
    ['home', 'Home'],
    ['services', 'Services'],
    ['network', 'Network'],
    ['tracking', 'Track'],
    ['about', 'About'],
    ['careers', 'Careers'],
  ];
  return (
    <nav className="nav">
      <div className="nav-inner">
        <button className="nav-logo" onClick={() => setRoute('home')} aria-label="Infinity Logistics — Home">
          <Mark size={36} stroke="var(--paper)" accent="var(--brass)" strokeWidth={5} />
          <span className="word">INFINITY</span>
        </button>
        <div className="nav-links" role="navigation" aria-label="Primary navigation">
          {links.map(([k, l]) => (
            <button
              key={k}
              className={'nav-link' + (route === k ? ' active' : '')}
              onClick={() => setRoute(k)}
              aria-current={route === k ? 'page' : undefined}
            >
              {l}
            </button>
          ))}
        </div>
        <div className="nav-cta">
          <button className="nav-link" onClick={() => setRoute('contact')}>Contact</button>
          <button className="btn btn-primary" onClick={() => setRoute('quote')}>Get a quote →</button>
        </div>
      </div>
    </nav>
  );
};

/* ── FOOTER ── */
const Footer = ({ setRoute }) => (
  <footer className="footer">
    <div className="footer-inner">
      <div className="footer-top">
        <div className="footer-col">
          <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 18 }}>
            <Mark size={48} stroke="var(--paper)" accent="var(--brass)" strokeWidth={5} />
            <div>
              <div style={{ fontFamily: 'Manrope', fontWeight: 800, fontSize: 22, letterSpacing: '-0.04em', color: 'var(--paper)' }}>INFINITY</div>
              <div className="mono" style={{ fontSize: 9, color: 'rgba(244,241,234,0.55)', marginTop: 2 }}>TRANSPORTATION · LOGISTICS</div>
            </div>
          </div>
          <p style={{ fontFamily: 'Fraunces', fontSize: 16, lineHeight: 1.5, color: 'rgba(244,241,234,0.7)', maxWidth: 320, margin: 0 }}>
            Move it, on time, without drama. Forty-three trucks, three port relationships.
          </p>
        </div>
        <div className="footer-col">
          <h4>Services</h4>
          <a onClick={() => setRoute('services')}>Long-haul</a>
          <a onClick={() => setRoute('services')}>Cross-dock</a>
          <a onClick={() => setRoute('services')}>Last-mile</a>
          <a onClick={() => setRoute('services')}>Drayage</a>
        </div>
        <div className="footer-col">
          <h4>Company</h4>
          <a onClick={() => setRoute('about')}>About</a>
          <a onClick={() => setRoute('careers')}>Careers</a>
          <a onClick={() => setRoute('case')}>Case study</a>
          <a onClick={() => setRoute('contact')}>Contact</a>
        </div>
        <div className="footer-col">
          <h4>Operations</h4>
          <a>4539 N 22nd St Ste R</a>
          <a>Phoenix, AZ 85016</a>
          <a href="mailto:dispatch@infinitylogistics-ai.com">dispatch@infinitylogistics-ai.com</a>
        </div>
      </div>
      <div className="footer-bot">
        <span>© 2026 Infinity Transportation &amp; Logistics LLC</span>
        <span>DOT #3845-921 · MC #149-2273</span>
      </div>
    </div>
  </footer>
);

/* ── HOME ── */
const Home = ({ setRoute }) => {
  const [trackId, setTrackId] = useState('');

  return (
    <div>
      {/* HERO */}
      <section className="hero">
        <div className="hero-grid-bg" aria-hidden="true"></div>
        <div className="hero-glow" aria-hidden="true"></div>
        <div className="hero-inner">
          <div className="fade-up">
            <div className="eyebrow eyebrow-dark" style={{ marginBottom: 28 }}>EST. 2008 · PHOENIX AZ</div>
            <h1 style={{ fontSize: 92, color: 'var(--paper)', marginBottom: 32 }}>
              Move it,<br />on time,<br /><span style={{ color: 'var(--brass)' }}>without drama.</span>
            </h1>
            <p className="lead" style={{ color: 'rgba(244,241,234,0.75)', maxWidth: 520, marginBottom: 40 }}>
              Forty-three trucks. Three port relationships. The same dispatchers your account had last quarter, this quarter, and next quarter.
            </p>
            <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
              <button className="btn btn-primary" onClick={() => setRoute('quote')}>Request a quote →</button>
              <button className="btn btn-ghost" onClick={() => setRoute('services')}>See services</button>
            </div>
          </div>
          <div className="track-widget fade-up" style={{ animationDelay: '0.15s' }}>
            <div className="eyebrow eyebrow-dark" style={{ fontSize: 10 }}>TRACK A SHIPMENT</div>
            <div style={{ fontFamily: 'Fraunces', fontSize: 24, color: 'var(--paper)', marginTop: 12, lineHeight: 1.25 }}>
              Live position, hourly pings, signed BOL.
            </div>
            <div className="track-input-row">
              <input
                className="track-input"
                placeholder="INF-2026-XXXXXX"
                value={trackId}
                onChange={e => setTrackId(e.target.value.toUpperCase())}
                aria-label="Tracking ID"
              />
              <button className="btn btn-primary" onClick={() => { if (trackId) setRoute('tracking'); }}>Track →</button>
            </div>
            <div className="mono" style={{ fontSize: 10, color: 'rgba(244,241,234,0.45)', marginTop: 14 }}>SAMPLE: INF-2026-04472</div>
          </div>
        </div>
      </section>

      {/* CUSTOMER MARQUEE */}
      <div style={{ background: 'var(--ink)', borderTop: '1px solid var(--rule-dark)', borderBottom: '1px solid var(--rule-dark)', padding: '20px 0', overflow: 'hidden' }} aria-label="Customers">
        <div style={{ display: 'flex', gap: 60, animation: 'truckRoll 8s ease-in-out infinite', justifyContent: 'center', whiteSpace: 'nowrap' }} className="mono">
          {['CARGILL', 'JM FAMILY', 'LANDSTAR', 'GEORGIA-PACIFIC', 'CSX INTERMODAL', 'ANHEUSER-BUSCH', 'PUBLIX SUPER MARKETS'].map(c => (
            <span key={c} style={{ fontSize: 12, color: 'rgba(244,241,234,0.4)', letterSpacing: '0.32em' }}>{c}</span>
          ))}
        </div>
      </div>

      {/* STATS */}
      <section className="section section-cream">
        <div className="section-inner">
          <div className="eyebrow" style={{ marginBottom: 16 }}>BY THE NUMBERS · 2025 OPERATING YEAR</div>
          <h2 style={{ fontSize: 64, maxWidth: 720, marginBottom: 80 }}>Built on experience. Moving freight without inventing new excuses.</h2>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 0, borderTop: '1px solid var(--rule)', borderBottom: '1px solid var(--rule)' }}>
            {[
              ['43', 'Trucks in fleet', 'Owned, not leased'],
              ['98.6%', 'On-time pickup', '15-min window'],
              ['1.2M', 'Loaded miles', 'Per year'],
              ['18', 'Years in business', 'Same family ownership'],
            ].map(([n, l, s], i) => (
              <div key={i} style={{ padding: '40px 32px', borderRight: i < 3 ? '1px solid var(--rule)' : 'none' }}>
                <div className="stat-num">{n}</div>
                <div className="stat-label">{l}</div>
                <div style={{ fontFamily: 'Fraunces', fontSize: 14, color: 'var(--mute)', marginTop: 6 }}>{s}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* SERVICES PREVIEW */}
      <section className="section section-stone">
        <div className="section-inner">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 64, flexWrap: 'wrap', gap: 24 }}>
            <div>
              <div className="eyebrow" style={{ marginBottom: 16 }}>WHAT WE MOVE</div>
              <h2 style={{ fontSize: 56, maxWidth: 600 }}>Four service lines. One operating standard.</h2>
            </div>
            <button className="btn btn-ink" onClick={() => setRoute('services')}>All services →</button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 24 }}>
            {[
              ['01', 'Long-haul dry van', "Coast-to-coast on dedicated lanes. 53' trailers, dual drivers on time-sensitive freight, ELD-tracked end to end.", 'FROM $2.40/MI'],
              ['02', 'Cross-dock & consolidation', '120,000 sq ft Phoenix facility. LTL inbound, FTL outbound. We sort, you save a leg.', '24-HR TURN'],
              ['03', 'Last-mile distribution', 'Southeast metros from a single dispatcher. Box trucks and sprinters, white-glove on request.', '7 STATES'],
              ['04', 'Port drayage', 'JAXPORT, Savannah, Charleston. Bonded, chassis pool access, customs partner on call.', '3 PORTS'],
            ].map(([n, t, d, m], i) => (
              <div
                key={i}
                className="card"
                style={{ padding: 40, cursor: 'pointer' }}
                onClick={() => setRoute('services')}
                role="button"
                tabIndex={0}
                onKeyDown={e => e.key === 'Enter' && setRoute('services')}
              >
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 32 }}>
                  <div className="mono" style={{ fontSize: 11, color: 'var(--brass-deep)' }}>SERVICE {n}</div>
                  <div className="mono" style={{ fontSize: 10, color: 'var(--mute)' }}>{m}</div>
                </div>
                <h3 style={{ fontSize: 32, marginBottom: 18 }}>{t}</h3>
                <p className="body" style={{ marginBottom: 24 }}>{d}</p>
                <div className="rule-brass"></div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* NETWORK MAP TEASER */}
      <section className="section section-dark">
        <div className="section-inner" style={{ display: 'grid', gridTemplateColumns: '1fr 1.2fr', gap: 80, alignItems: 'center' }}>
          <div>
            <div className="eyebrow eyebrow-dark" style={{ marginBottom: 16 }}>THE NETWORK</div>
            <h2 style={{ fontSize: 56, color: 'var(--paper)', marginBottom: 28 }}>Southeast spine, national reach.</h2>
            <p className="lead" style={{ color: 'rgba(244,241,234,0.7)', marginBottom: 32 }}>
              Hub in Phoenix. Drop yards in Dallas, Atlanta, and Memphis. Partner network covers 48 contiguous states with same-week capacity.
            </p>
            <button className="btn btn-primary" onClick={() => setRoute('network')}>Explore the map →</button>
          </div>
          <div style={{ position: 'relative', aspectRatio: '4/3', background: 'rgba(244,241,234,0.03)', border: '1px solid var(--rule-dark)' }} aria-hidden="true">
            <svg viewBox="0 0 400 300" style={{ width: '100%', height: '100%' }}>
              <path d="M40 120 L 80 90 L 140 80 L 200 75 L 270 78 L 340 88 L 360 110 L 355 150 L 340 180 L 310 210 L 270 225 L 220 230 L 170 225 L 130 215 L 90 195 L 60 170 L 40 145 Z"
                fill="rgba(244,241,234,0.04)" stroke="rgba(244,241,234,0.18)" strokeWidth="1" />
              <line x1="110" y1="165" x2="240" y2="170" stroke="var(--brass)" strokeWidth="1.5" strokeDasharray="4 4" style={{ animation: 'dash 3s linear infinite' }} />
              <line x1="110" y1="165" x2="200" y2="150" stroke="var(--brass)" strokeWidth="1.5" strokeDasharray="4 4" style={{ animation: 'dash 4s linear infinite' }} />
              <line x1="110" y1="165" x2="150" y2="180" stroke="var(--brass)" strokeWidth="1.5" strokeDasharray="4 4" style={{ animation: 'dash 5s linear infinite' }} />
              <line x1="110" y1="165" x2="70" y2="140" stroke="var(--brass)" strokeWidth="1.5" strokeDasharray="4 4" style={{ animation: 'dash 6s linear infinite' }} />
              {[[110,165,'PHX',true],[240,170,'ATL'],[200,150,'MEM'],[150,180,'DAL'],[70,140,'LAX'],[280,200,'JAX'],[330,140,'NYC']].map(([x,y,l,hub],i) => (
                <g key={i}>
                  <circle cx={x} cy={y} r={hub ? 6 : 3} fill="var(--brass)" />
                  {hub && <circle cx={x} cy={y} r="6" fill="none" stroke="var(--brass)" strokeWidth="1" style={{ animation: 'pulseDot 2s ease-in-out infinite' }} />}
                  <text x={x} y={y - 12} fill={hub ? 'var(--brass)' : 'rgba(244,241,234,0.6)'} fontSize="9" fontFamily="JetBrains Mono" textAnchor="middle" letterSpacing="2">{l}</text>
                </g>
              ))}
            </svg>
          </div>
        </div>
      </section>

            </div>
          )}

          {step < 4 && (
            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 48, paddingTop: 32, borderTop: '1px solid var(--rule)' }}>
              {step > 1
                ? <button className="btn btn-ghost-ink" onClick={() => setStep(s => s - 1)}>← Back</button>

              }
              <button className="btn btn-primary" onClick={() => setStep(s => s + 1)}>
                {step === 3 ? 'Submit quote request →' : 'Continue →'}
              </button>
            </div>
          )}
        </div>
      </section>
    </div>
  );
};

/* ── APP (router) ── */
const App = () => {
  const [route, setRoute] = useState(() => {
    const hash = location.hash.slice(1);
    return hash || 'home';
  });

  useEffect(() => {
    const onHash = () => {
      const hash = location.hash.slice(1);
      setRoute(hash || 'home');
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  useEffect(() => {
    if (location.hash !== '#' + route) location.hash = '#' + route;
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, [route]);

  const pages = { home: Home, services: Services, network: Network, tracking: Tracking, quote: Quote, about: About, careers: Careers, case: CaseStudy, contact: Contact };
  const Page = pages[route] || Home;

  return (
    <div>
      <Nav route={route} setRoute={setRoute} />
      <main>
        <Page setRoute={setRoute} />
      </main>
      <Footer setRoute={setRoute} />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
